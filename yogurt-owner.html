<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ดูออเดอร์ 🧾</title>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
:root { --green:#10b981; --pink:#ff6eb4; --orange:#fb923c; --yellow:#fbbf24; --red:#f87171; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Prompt',sans-serif; background:#080f1a; color:white; min-height:100vh; }

.header {
background:rgba(8,15,26,0.95); backdrop-filter:blur(20px);
border-bottom:1px solid rgba(255,255,255,0.07);
padding:16px 20px; position:sticky; top:0; z-index:10;
display:flex; align-items:center; justify-content:space-between; gap:12px;
}
.header-left { display:flex; align-items:center; gap:10px; }
.header-title { font-size:18px; font-weight:700; }
.header-sub { font-size:11px; color:rgba(255,255,255,0.35); margin-top:2px; }
.live-badge { display:flex; align-items:center; gap:6px; background:rgba(16,185,129,0.12); border:1px solid rgba(16,185,129,0.25); border-radius:100px; padding:6px 14px; font-size:12px; color:var(–green); font-weight:600; }
.live-dot { width:8px; height:8px; border-radius:50%; background:var(–green); animation:pulse 1.5s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

/* Stats */
.stats { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; padding:14px 16px; }
.stat { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.07); border-radius:16px; padding:14px 10px; text-align:center; }
.stat-val { font-size:22px; font-weight:900; }
.stat-val.money { color: var(–pink); }
.stat-val.green { color:var(–green); }
.stat-val.yellow { color:var(–yellow); }
.stat-label { font-size:11px; color:rgba(255,255,255,0.35); margin-top:4px; }

/* Filters */
.filters { display:flex; gap:8px; padding:0 16px 14px; overflow-x:auto; }
.filters::-webkit-scrollbar { display:none; }
.f-btn { padding:8px 16px; border-radius:100px; border:1.5px solid rgba(255,255,255,0.1); background:transparent; color:rgba(255,255,255,0.45); font-family:‘Prompt’,sans-serif; font-size:13px; font-weight:600; cursor:pointer; white-space:nowrap; transition:all 0.2s; }
.f-btn.active { border-color:var(–green); color:var(–green); background:rgba(16,185,129,0.1); }
.clear-btn { margin-left:auto; padding:8px 16px; border-radius:100px; border:1.5px solid rgba(248,113,113,0.3); background:rgba(248,113,113,0.07); color:rgba(248,113,113,0.8); font-family:‘Prompt’,sans-serif; font-size:13px; font-weight:600; cursor:pointer; white-space:nowrap; transition:all 0.2s; }
.clear-btn:hover { border-color:rgba(248,113,113,0.6); color:white; }

/* Orders */
.orders { padding:0 16px 80px; display:flex; flex-direction:column; gap:12px; }
.order-card {
background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08);
border-radius:20px; padding:18px; transition:all 0.3s ease;
animation:cardIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes cardIn { from{opacity:0;transform:scale(0.94) translateY(10px);} to{opacity:1;transform:scale(1) translateY(0);} }
.order-card.new-order { border-color:rgba(255,110,180,0.35); box-shadow:0 0 24px rgba(255,110,180,0.08); }
.order-card.done { opacity:0.45; }

.order-top { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:12px; }
.order-time { font-size:18px; font-weight:700; }
.order-no { font-size:11px; color:rgba(255,255,255,0.35); margin-top:2px; }
.badge { padding:4px 12px; border-radius:100px; font-size:11px; font-weight:700; letter-spacing:1px; }
.badge.new { background:rgba(255,110,180,0.18); color:var(–pink); border:1px solid rgba(255,110,180,0.3); }
.badge.done { background:rgba(16,185,129,0.14); color:var(–green); border:1px solid rgba(16,185,129,0.25); }

.order-items { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; }
.item-chip { display:flex; align-items:center; gap:6px; background:rgba(255,255,255,0.06); border-radius:12px; padding:8px 14px; font-size:14px; font-weight:600; }

.order-bottom { display:flex; align-items:center; justify-content:space-between; gap:8px; }
.order-total { font-size:22px; font-weight:900; background:linear-gradient(135deg,var(–pink),var(–orange)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; flex-shrink:0; }
.order-note { font-size:12px; color:rgba(255,255,255,0.35); font-style:italic; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.done-btn { padding:8px 16px; border-radius:12px; border:none; cursor:pointer; font-family:‘Prompt’,sans-serif; font-size:13px; font-weight:700; transition:all 0.2s; flex-shrink:0; }
.done-btn.finish { background:rgba(16,185,129,0.18); color:var(–green); }
.done-btn.finish:hover { background:rgba(16,185,129,0.32); }
.done-btn.undo { background:rgba(255,255,255,0.07); color:rgba(255,255,255,0.35); }

.empty { text-align:center; padding:64px 20px; color:rgba(255,255,255,0.25); }
.empty-icon { font-size:52px; display:block; margin-bottom:14px; }
</style>

</head>
<body>

<div class="header">
  <div class="header-left">
    <div>
      <div class="header-title">🧾 ออเดอร์</div>
      <div class="header-sub" id="last-update">กำลังเชื่อมต่อ...</div>
    </div>
  </div>
  <div class="live-badge"><div class="live-dot"></div>LIVE</div>
</div>

<div class="stats">
  <div class="stat"><div class="stat-val money" id="s-revenue">฿0</div><div class="stat-label">ยอดรวม</div></div>
  <div class="stat"><div class="stat-val green" id="s-orders">0</div><div class="stat-label">ออเดอร์</div></div>
  <div class="stat"><div class="stat-val yellow" id="s-cups">0</div><div class="stat-label">ถ้วย</div></div>
</div>

<div class="filters">
  <button class="f-btn active" onclick="setFilter('all',this)">ทั้งหมด</button>
  <button class="f-btn" onclick="setFilter('new',this)">🔔 ใหม่</button>
  <button class="f-btn" onclick="setFilter('done',this)">✅ เสร็จ</button>
  <button class="clear-btn" onclick="clearAll()">🗑️ ล้างทั้งหมด</button>
</div>

<div class="orders" id="orders-list">
  <div class="empty"><span class="empty-icon">🍦</span><div>กำลังรอออเดอร์...</div></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, update, remove, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({ databaseURL: "https://yogurt-shop-default-rtdb.firebaseio.com" });
const db = getDatabase(app);

let allOrders = []; // [{key, data}]
let filter = 'all';
let prevCount = 0;

const ordersRef = ref(db, 'orders');
onValue(ordersRef, (snap) => {
  allOrders = [];
  if (snap.exists()) {
    snap.forEach(child => {
      allOrders.push({ key: child.key, ...child.val() });
    });
  }
  allOrders.sort((a,b) => (b.timestamp||0) - (a.timestamp||0));
  render();
  updateStats();
  const now = new Date().toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('last-update').textContent = `อัปเดต ${now}`;
});

function setFilter(f, btn) {
  filter = f;
  document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}
window.setFilter = setFilter;

function updateStats() {
  const revenue = allOrders.reduce((s,o) => s + (o.total||0), 0);
  const cups = allOrders.reduce((s,o) => s + (o.mango||0) + (o.original||0), 0);
  document.getElementById('s-revenue').textContent = '฿' + revenue.toLocaleString();
  document.getElementById('s-orders').textContent = allOrders.length;
  document.getElementById('s-cups').textContent = cups;
}

function render() {
  const list = document.getElementById('orders-list');
  let filtered = allOrders;
  if (filter === 'new') filtered = allOrders.filter(o => o.status === 'new');
  if (filter === 'done') filtered = allOrders.filter(o => o.status === 'done');

  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty"><span class="empty-icon">🍦</span><div>${filter==='all'?'กำลังรอออเดอร์...':'ไม่มีออเดอร์'}</div></div>`;
    prevCount = 0; return;
  }

  const isNew = filtered.length > prevCount;
  prevCount = filtered.length;

  list.innerHTML = filtered.map((o, i) => {
    const isNewOrder = o.status === 'new';
    let items = '';
    if (o.mango > 0) items += `<div class="item-chip">🥭 มะม่วง × ${o.mango}</div>`;
    if (o.original > 0) items += `<div class="item-chip">🤍 ออริจินอล × ${o.original}</div>`;
    return `
      <div class="order-card ${isNewOrder?'new-order':'done'} ${isNew&&i===0?'new-flash':''}">
        <div class="order-top">
          <div>
            ${o.name ? `<div style="font-size:17px;font-weight:900;color:#ff6eb4;margin-bottom:3px;">👤 ${o.name}</div>` : ''}
            <div class="order-time">${o.time||''}</div>
          </div>
          <span class="badge ${isNewOrder?'new':'done'}">${isNewOrder?'🔔 ใหม่':'✅ เสร็จ'}</span>
        </div>
        <div class="order-items">${items}</div>
        <div class="order-bottom">
          <div class="order-total">฿${o.total||0}</div>
          ${o.note ? `<div class="order-note">📝 ${o.note}</div>` : '<div class="order-note"></div>'}
          <button class="done-btn ${isNewOrder?'finish':'undo'}" onclick="toggleDone('${o.key}','${o.status}')">
            ${isNewOrder?'✅ เสร็จ':'↩ ยกเลิก'}
          </button>
        </div>
      </div>`;
  }).join('');
}

window.toggleDone = async (key, status) => {
  await update(ref(db, 'orders/' + key), { status: status === 'done' ? 'new' : 'done' });
};

window.clearAll = async () => {
  if (!confirm('ล้างออเดอร์ทั้งหมดใช่ไหม?')) return;
  await remove(ref(db, 'orders'));
};
</script>

</body>
</html>
